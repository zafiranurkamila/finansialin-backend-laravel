openapi: 3.0.3
info:
  title: Finansialin API Documentation
  version: 1.0.0
  description: >
    Dokumentasi Swagger (OpenAPI 3.0) untuk aplikasi backend Finansialin (Laravel).
    Berisi dokumentasi untuk endpoint Auth, Users, Categories, Resources,
    Transactions, Budgets, Notifications, AI Features, Subscriptions, dan Webhooks.
servers:
  - url: "http://127.0.0.1:8000/api"
    description: Local Server

security:
  - BearerAuth: []

tags:
  - name: Auth
    description: Autentikasi pengguna, token, dan 2FA
  - name: Users
    description: Manajemen profil dan password pengguna
  - name: Categories
    description: Manajemen kategori transaksi (default & user-specific)
  - name: Resources
    description: Manajemen dompet dan saldo
  - name: Transactions
    description: Pencatatan dan pencarian transaksi (income/expense)
  - name: Budgets
    description: Manajemen anggaran (budgets) dan alokasi
  - name: Notifications
    description: Pengelolaan notifikasi pengguna
  - name: AI Features
    description: AI Assistant dan fitur Receipt OCR
  - name: Subscriptions
    description: Deteksi langganan dan pengeluaran berulang
  - name: Integrations
    description: Integrasi webhooks pihak ketiga

paths:
  /auth/register:
    post:
      tags:
        - Auth
      summary: Register User Baru
      description: Mendaftarkan user baru dan langsung menerbitkan token akses.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: "user@example.com"
                password:
                  type: string
                  format: password
                  minLength: 6
                  example: "secret123"
                name:
                  type: string
                  example: "John Doe"
                phone:
                  type: string
                  example: "081234567890"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/TokenResponse"
                  - type: object
                    properties:
                      user:
                        $ref: "#/components/schemas/User"
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /auth/login:
    post:
      tags:
        - Auth
      summary: Login User
      description: Proses autentikasi dengan email dan password. Mendukung 2FA (mengembalikan status 202 jika butuh validasi OTP).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: "user@example.com"
                password:
                  type: string
                  format: password
                  example: "secret123"
      responses:
        "200":
          description: Login Successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/TokenResponse"
                  - type: object
                    properties:
                      user:
                        $ref: "#/components/schemas/User"
        "202":
          description: 2FA OTP Required
          content:
            application/json:
              schema:
                type: object
                properties:
                  requiresTwoFactor:
                    type: boolean
                    example: true
                  twoFactorToken:
                    type: string
                    example: "temp-bearer-jwt"
                  message:
                    type: string
                    example: "Two-factor authentication required"
                  expiresIn:
                    type: integer
                    example: 300
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/2fa/verify-login:
    post:
      tags:
        - Auth
      summary: Verify Login OTP
      description: Verifikasi OTP untuk login saat 2FA aktif.
      security:
        - TwoFactorAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  example: "123456"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/TokenResponse"
                  - type: object
                    properties:
                      user:
                        $ref: "#/components/schemas/User"
        "401":
          description: Invalid Pending Token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Invalid/Expired OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh Token
      description: Memperbarui access token dengan menggunakan refresh token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  example: "refresh-token-xyz"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          description: Invalid/Expired Refresh Token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/forgot-password:
    post:
      tags:
        - Auth
      summary: Forgot Password
      description: Meminta link/token reset password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: "user@example.com"
      responses:
        "200":
          description: Reset link requested
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Password reset instructions sent"

  /auth/reset-password:
    post:
      tags:
        - Auth
      summary: Reset Password
      description: Melakukan pergantian password menggunakan broker token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - token
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: "user@example.com"
                token:
                  type: string
                  example: "reset-token-123"
                password:
                  type: string
                  format: password
                  minLength: 6
                  example: "newsecret456"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Password reset successful"
                  success:
                    type: boolean
                    example: true
        "400":
          description: Invalid/Expired Token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/profile:
    get:
      tags:
        - Auth
      summary: Get Profile
      description: Mendapatkan data profile user yang sedang login.
      responses:
        "200":
          description: Profile data
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  email:
                    type: string
                    example: "user@example.com"
                  phone:
                    type: string
                    example: "+6281234567890"
                  name:
                    type: string
                    example: "John Doe"
                  emailVerifiedAt:
                    type: string
                    format: date-time
                    nullable: true
                  isEmailVerified:
                    type: boolean
                    example: true
                  twoFactorEnabled:
                    type: boolean
                    example: false
                  user:
                    $ref: "#/components/schemas/User"

  /auth/email/verification/send:
    post:
      tags:
        - Auth
      summary: Send Email Verification OTP
      description: Mengirim OTP verifikasi email ke user.
      responses:
        "200":
          description: OTP Sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Verification code sent"
                  expiresAt:
                    type: string
                    format: date-time

  /auth/email/verification/verify:
    post:
      tags:
        - Auth
      summary: Verify Email via OTP
      description: Memverifikasi OTP yang dikirim ke email.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  example: "123456"
      responses:
        "200":
          description: Verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Email verified successfully"
                  emailVerifiedAt:
                    type: string
                    format: date-time

  /auth/2fa/enable:
    post:
      tags:
        - Auth
      summary: Request 2FA Activation OTP
      description: Meminta OTP untuk aktivasi 2FA yang mensyaratkan konfirmasi password saat ini.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                password:
                  type: string
                  example: "secret123"
      responses:
        "200":
          description: OTP requested
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "OTP sent"
                  expiresAt:
                    type: string
                    format: date-time

  /auth/2fa/enable/verify:
    post:
      tags:
        - Auth
      summary: Verify OTP to Enable 2FA
      description: Verifikasi OTP untuk benar-benar mengaktifkan 2FA.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  example: "123456"
      responses:
        "200":
          description: 2FA Activated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Two-factor authentication enabled"
                  twoFactorEnabled:
                    type: boolean
                    example: true

  /auth/2fa/disable:
    post:
      tags:
        - Auth
      summary: Disable 2FA
      description: Menonaktifkan 2FA dengan validasi password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                password:
                  type: string
                  example: "secret123"
      responses:
        "200":
          description: 2FA Disabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Two-factor authentication disabled"
                  twoFactorEnabled:
                    type: boolean
                    example: false

  /auth/logout:
    post:
      tags:
        - Auth
      summary: Logout
      description: Keluar dan membatalkan bearer access token yang sedang aktif.
      responses:
        "200":
          description: Logout Successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Logout successful"

  /users/name:
    patch:
      tags:
        - Users
      summary: Update Name
      description: Mengubah hanya field name profil.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: "Jane Doe"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Name updated"

  /users/profile:
    put:
      tags:
        - Users
      summary: Update Profile
      description: Mengupdate banyak field profil sekaligus.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "Jane Doe"
                email:
                  type: string
                  format: email
                  example: "janedoe@example.com"
      responses:
        "200":
          description: Success

  /users/password:
    patch:
      tags:
        - Users
      summary: Change Password
      description: Mengubah password akun ter-autentikasi (mensyaratkan old password).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - oldPassword
                - newPassword
              properties:
                oldPassword:
                  type: string
                  example: "secret123"
                newPassword:
                  type: string
                  example: "newsecret456"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Password changed successfully"

  /categories:
    get:
      tags:
        - Categories
      summary: Get All Categories
      description: Menampilkan semua kategori (default app + kategori spesifik user).
      responses:
        "200":
          description: Category List
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

    post:
      tags:
        - Categories
      summary: Create Category
      description: Membuat custom kategori kustom spesifik user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: "Makan Malam"
                type:
                  type: string
                  enum: [income, expense]
                  example: "expense"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "409":
          description: Conflict Duplicate Name+Type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /categories/suggest:
    get:
      tags:
        - Categories
      summary: Suggest Category
      description: Rekomendasi kategori berdasarkan input history atau context NLP dasar.
      parameters:
        - in: query
          name: type
          schema:
            type: string
            enum: [income, expense]
            default: expense
        - in: query
          name: description
          schema:
            type: string
          example: "starbucks"
        - in: query
          name: source
          schema:
            type: string
      responses:
        "200":
          description: Suggestion Output
          content:
            application/json:
              schema:
                type: object
                properties:
                  suggested:
                    $ref: "#/components/schemas/Category"
                  confidence:
                    type: number
                    format: float
                    example: 0.85
                  reason:
                    type: string
                    example: "Matches history description"

  /categories/{id}:
    get:
      tags:
        - Categories
      summary: Get Category Detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Category Detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Not Found

    put:
      tags:
        - Categories
      summary: Update Category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: "Groceries"
                type:
                  type: string
                  enum: [income, expense]
      responses:
        "200":
          description: Success update
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "403":
          description: Cannot modify default defaults

    delete:
      tags:
        - Categories
      summary: Delete Category
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sukses hapus
        "403":
          description: Cannot delete default
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /resources:
    get:
      tags:
        - Resources
      summary: Get All Resources
      description: Menampilkan daftar resources (dompet/saldo) milik user.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Resource list
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Daftar resources berhasil diambil"
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Resource"

  /resources/{idResource}:
    get:
      tags:
        - Resources
      summary: Get Resource Detail
      parameters:
        - in: path
          name: idResource
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Resource detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Detail resource berhasil diambil"
                  data:
                    $ref: "#/components/schemas/Resource"
        "404":
          description: Resource not found
      security:
        - BearerAuth: []

  /resources/summary:
    get:
      tags:
        - Resources
      summary: Get Resource Summary
      responses:
        "200":
          description: Resource summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Ringkasan resources berhasil diambil"
                  data:
                    type: object
                    properties:
                      resources:
                        type: array
                        items:
                          $ref: "#/components/schemas/Resource"
                      totalBalance:
                        type: number
                        example: 2500000
                      resourceCount:
                        type: integer
                        example: 3
      security:
        - BearerAuth: []

  /transactions:
    get:
      tags:
        - Transactions
      summary: Get Transactions
      description: Mendapatkan semua transaksi.
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

    post:
      tags:
        - Transactions
      summary: Create Transaction
      description: Pembuatan transaksi dengan dukungan file image resi.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - idResource
                - type
                - amount
              properties:
                idCategory:
                  type: integer
                  example: 5
                idResource:
                  type: integer
                  example: 2
                type:
                  type: string
                  enum: [income, expense]
                  example: "expense"
                amount:
                  type: number
                  example: 50000
                description:
                  type: string
                  example: "Makan Siang Sate"
                date:
                  type: string
                  format: date-time
                  example: "2024-05-15 12:30:00"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "422":
          description: Validation Error

  /transactions/search:
    get:
      tags:
        - Transactions
      summary: Search & Filter Transactions
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: type
          schema:
            type: string
            enum: [income, expense]
        - in: query
          name: idCategory
          schema:
            type: integer
        - in: query
          name: source
          schema:
            type: string
          description: Filter by linked resource source name (for example `mbanking`, `emoney`, `cash`).
        - in: query
          name: minAmount
          schema:
            type: number
        - in: query
          name: maxAmount
          schema:
            type: number
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date
        - in: query
          name: dateTo
          schema:
            type: string
            format: date
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [date, amount, createdAt, updatedAt]
            default: date
        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - in: query
          name: limit
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: Success list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  /transactions/month/{year}/{month}:
    get:
      tags:
        - Transactions
      summary: Get Transactions by Month
      parameters:
        - in: path
          name: year
          required: true
          schema:
            type: integer
            example: 2024
        - in: path
          name: month
          required: true
          schema:
            type: integer
            example: 5
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
        "400":
          description: Invalid Parameter

  /transactions/{id}:
    get:
      tags:
        - Transactions
      summary: Get Transaction Detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "404":
          description: Not Found

    put:
      tags:
        - Transactions
      summary: Update Transaction
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                idCategory:
                  type: integer
                idResource:
                  type: integer
                type:
                  type: string
                  enum: [income, expense]
                amount:
                  type: number
                description:
                  type: string
                date:
                  type: string
                  format: date-time
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

    delete:
      tags:
        - Transactions
      summary: Delete Transaction
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted (also removes receipt file if present)

  /budgets:
    get:
      tags:
        - Budgets
      summary: Get List of Budgets
      responses:
        "200":
          description: List of Budgets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Budget"

    post:
      tags:
        - Budgets
      summary: Create New Budget
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - periodStart
                - periodEnd
                - amount
              properties:
                idCategory:
                  type: integer
                  example: 3
                period:
                  type: string
                  enum: [day, daily, week, weekly, monthly, year, yearly]
                  example: "monthly"
                periodStart:
                  type: string
                  format: date
                  example: "2024-05-01"
                periodEnd:
                  type: string
                  format: date
                  example: "2024-05-31"
                amount:
                  type: number
                  example: 1000000
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Budget"

  /budgets/{id}:
    get:
      tags:
        - Budgets
      summary: Detail Budget
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Single Budget detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Budget"

    put:
      tags:
        - Budgets
      summary: Update Budget
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                idCategory:
                  type: integer
                period:
                  type: string
                periodStart:
                  type: string
                  format: date
                periodEnd:
                  type: string
                  format: date
                amount:
                  type: number
      responses:
        "200":
          description: Complete update Budget
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Budget"

    delete:
      tags:
        - Budgets
      summary: Delete Budget
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Delete Success

  /budgets/{id}/usage:
    get:
      tags:
        - Budgets
      summary: Usage Summary
      description: Penggunaan uang dibanding limit anggaran suatu category di cycle tertentu.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Usage info
          content:
            application/json:
              schema:
                type: object
                properties:
                  used:
                    type: number
                  total:
                    type: number
                  percent:
                    type: number
                    format: float

  /budgets/filter:
    get:
      tags:
        - Budgets
      summary: Filter Budgets
      parameters:
        - in: query
          name: period
          schema:
            type: string
            default: monthly
        - in: query
          name: date
          schema:
            type: string
            format: date
        - in: query
          name: idCategory
          schema:
            type: integer
      responses:
        "200":
          description: Budgets

  /budgets/goals:
    get:
      tags:
        - Budgets
      summary: Budget vs Spending Goals
      parameters:
        - in: query
          name: period
          schema:
            type: string
            default: monthly
        - in: query
          name: type
          schema:
            type: string
            enum: [expense, income]
            default: expense
        - in: query
          name: date
          schema:
            type: string
            format: date
        - in: query
          name: idCategory
          schema:
            type: integer
      responses:
        "200":
          description: Aggregation logic Goals
          content:
            application/json:
              schema:
                type: object
                properties:
                  period:
                    type: object
                    properties:
                      start:
                        type: string
                      end:
                        type: string
                      period:
                        type: string
                  totals:
                    type: object
                    properties:
                      totalBudget:
                        type: number
                      totalSpent:
                        type: number
                      remaining:
                        type: number
                      percent:
                        type: number
                  data:
                    type: array
                    items:
                      type: object

  /budgets/predictive:
    get:
      tags:
        - Budgets
      summary: Predictive Budgets Info
      description: Meramal 30/60/90 days prediction berdasar pattern data
      responses:
        "200":
          description: Predictive stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    type: object
                  trends:
                    type: array
                    items:
                      type: object
                  categoryWarnings:
                    type: array
                    items:
                      type: object

  /budgets/income-split:
    post:
      tags:
        - Budgets
      summary: Income-Split Calculator
      description: Hitungan proporsi alokasi budget berdasar persentase income split.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - periodStart
                - periodEnd
                - allocations
              properties:
                period:
                  type: string
                periodStart:
                  type: string
                  format: date
                periodEnd:
                  type: string
                  format: date
                apply:
                  type: boolean
                  default: false
                allocations:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required:
                      - percent
                    properties:
                      idCategory:
                        type: integer
                      percent:
                        type: number
                        example: 30
      responses:
        "200":
          description: Hasil hitung
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    type: object
                  allocations:
                    type: array
                    items:
                      type: object
                  createdBudgets:
                    type: array
                    items:
                      type: object

  /notifications:
    get:
      tags:
        - Notifications
      summary: Get all notifications
      responses:
        "200":
          description: Success

  /notifications/unread:
    get:
      tags:
        - Notifications
      summary: Get unread
      responses:
        "200":
          description: Success

  /notifications/unread/count:
    get:
      tags:
        - Notifications
      summary: Get count unread
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                    example: 3

  /notifications/{id}/read:
    patch:
      tags:
        - Notifications
      summary: Mark as Read
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Marked

  /notifications/read-all:
    patch:
      tags:
        - Notifications
      summary: Mark all unread as Read
      responses:
        "200":
          description: All Marked

  /ai/receipt-ocr:
    post:
      tags:
        - AI Features
      summary: Auto-Scan Kuitansi (OCR AI Lokal)
      description: >
        Endpoint ini digunakan untuk mendukung fitur "Pencatatan Otomatis" dari sebuah kuitansi. 
        Menggunakan model Vision AI lokal (Donut OCR) untuk memindai foto kuitansi secara otomatis dan mengekstrak informasi krusial seperti Nama Merchant, Total Harga, dan Tanggal transaksi.
        Data yang dikembalikan dapat langsung digunakan oleh frontend untuk melakukan auto-fill form pencatatan transaksi tanpa input manual dari pengguna.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - receiptImage
              properties:
                receiptImage:
                  type: string
                  format: binary
                  description: File gambar (.jpg, .png)
      responses:
        "200":
          description: Ekstraksi Berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    type: object
                    properties:
                      merchant_name:
                        type: string
                        example: "Indomaret"
                      total_amount:
                        type: number
                        example: 250000
                      date:
                        type: string
                        example: "2026-04-27"
                      suggested_category:
                        type: string
                        example: "Pengeluaran Lainnya"

  /ai/predict-early-warning:
    post:
      tags:
        - AI Features
      summary: Predictive Budget Early Warning
      description: >
        Memprediksi apakah pengeluaran pengguna akan melebihi budget di bulan ini menggunakan Machine Learning (Time Series Forecasting). 
        Sistem menganalisis tren pengeluaran harian dan memproyeksikan total pengeluaran di akhir siklus budget. Berguna untuk memberikan peringatan dini kepada user sebelum uang mereka benar-benar habis.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - budget
                - payday_date
                - expenses
              properties:
                user_id:
                  type: integer
                budget:
                  type: number
                payday_date:
                  type: integer
                expenses:
                  type: array
                  items:
                    type: object
                    properties:
                      date:
                        type: string
                        format: date
                      amount:
                        type: number
      responses:
        "200":
          description: Prediksi selesai
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: integer
                  projected_total_expense:
                    type: number
                    example: 1200000.50
                  budget:
                    type: number
                    example: 1000000
                  is_overspending:
                    type: boolean
                    example: true
                  warning_message:
                    type: string
                    example: "Warning: Projected total expenses exceed your monthly budget. Consider adjusting your spending habits."

  /ai/assistant:
    get:
      tags:
        - AI Features
      summary: User AI Assistant (Summary & Tips)
      description: >
        Menghasilkan ringkasan kondisi keuangan, tips hemat, atau peringatan budget untuk dashboard user. 
        Backend akan mengkalkulasi agregat finansial 30 hari terakhir dan merangkainya menjadi sebuah prompt kontekstual yang kemudian dijawab secara cerdas berdasarkan parameter `prompt`.
      parameters:
        - in: query
          name: prompt
          schema:
            type: string
            default: summary
            enum: [summary, saving_tips, what_to_cut, budget_alerts, free_text]
        - in: query
          name: message
          schema:
            type: string
      responses:
        "200":
          description: AI Generation
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    type: string
                  assistantReply:
                    type: string
                  quickPrompts:
                    type: array
                    items:
                      type: string

  /chat:
    post:
      tags:
        - AI Features
      summary: Chat with Finansialin AI
      description: >
        Chat interaktif dengan AI Assistant (LLM) yang terintegrasi dengan metode Function Calling (ReAct Agent).
        AI mampu memanggil fungsi internal sistem secara real-time untuk menjawab pertanyaan user secara akurat, seperti mengecek saldo dompet saat ini, menganalisis pengeluaran bulanan, memantau status budget dan memberikan peringatan, melacak transaksi terbaru, membaca tren pengeluaran dan memberikan profil finansial pengguna.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
                  example: "Berapa sisa uangku di dompet?"
      responses:
        "200":
          description: AI Respuesta
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: string
                    example: "Hai! Saat ini sisa uangmu di dompet sebesar Rp. 500,000."

  /subscriptions/dashboard:
    get:
      tags:
        - Subscriptions
      summary: Detect Recurring Bills
      parameters:
        - in: query
          name: lookbackDays
          schema:
            type: integer
            default: 120
      responses:
        "200":
          description: Subs data

  /integrations/qris/email:
    post:
      tags:
        - Integrations
      summary: Webhook Pencatatan Otomatis QRIS/Email
      description: >
        Endpoint Webhook yang menerima payload otomatis dari mesin email (seperti N8N atau Zapier) ketika terdapat email notifikasi pembayaran QRIS.
        Endpoint ini mem-parsing isi data dan secara otomatis melakukan pencatatan transaksi (expense) ke akun pengguna tanpa interaksi manual (Seamless Auto-recording).
      security: []
      parameters:
        - in: header
          name: X-Webhook-Secret
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - amount
              properties:
                email:
                  type: string
                  format: email
                amount:
                  type: number
                paidAt:
                  type: string
                  format: date-time
                description:
                  type: string
                source:
                  type: string
                categoryName:
                  type: string
                merchant:
                  type: string
      responses:
        "201":
          description: Transaksi ter-inject

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Authentication standar menggunakan Bearer Token
    TwoFactorAuth:
      type: http
      scheme: bearer
      description: Authentication pendukung untuk pending verifikasi 2FA (Bearer Token)
  schemas:
    TokenResponse:
      type: object
      properties:
        accessToken:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5c... "
        refreshToken:
          type: string
          example: "refresh_xyz_789..."
        access_token:
          type: string
          description: "Compatibility alias"
        refresh_token:
          type: string
        expiresIn:
          type: integer
          example: 3600
        message:
          type: string
          example: "Success"

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        idUser:
          type: integer
          example: 1
        name:
          type: string
          example: "John Doe"
        email:
          type: string
          format: email
          example: "johndoe@example.com"
        phone:
          type: string
          example: "+6281234567890"

    Category:
      type: object
      properties:
        id:
          type: integer
        idCategory:
          type: integer
        name:
          type: string
          example: "Food"
        type:
          type: string
          example: "expense"

    Resource:
      type: object
      properties:
        id:
          type: integer
        idResource:
          type: integer
        idUser:
          type: integer
        source:
          type: string
          example: "cash"
        balance:
          type: number
          description: "Current wallet balance maintained by the backend when transactions are created, updated, or deleted."
          example: 150000

    Transaction:
      type: object
      properties:
        id:
          type: integer
        idCategory:
          type: integer
          nullable: true
        idResource:
          type: integer
          nullable: true
        type:
          type: string
          example: "expense"
        amount:
          type: number
          example: 15000
        description:
          type: string
          example: "Beli Makan"
        date:
          type: string
          format: date-time
        resource:
          $ref: "#/components/schemas/Resource"

    Budget:
      type: object
      properties:
        id:
          type: integer
        idCategory:
          type: integer
          nullable: true
        period:
          type: string
          example: "monthly"
        periodStart:
          type: string
          format: date
        periodEnd:
          type: string
          format: date
        amount:
          type: number
          example: 1000000

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: "Unauthorized"

    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: "The email has already been taken."
